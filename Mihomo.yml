# mihomo 配置模板：使用 rule-providers 组合维护中的上游规则。
# 使用前把 proxy-providers.default.url 替换为你的订阅地址；如客户端已负责注入节点，可仅合并 dns / proxy-groups / rule-providers / rules 部分。

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite.dat
  geoip: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip.dat
  mmdb: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/country.mmdb
  asn: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/GeoLite2-ASN.mmdb

proxy-providers:
  default:
    type: http
    url: https://example.com/your-subscription-url
    interval: 86400
    path: ./providers/proxy/default.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🚀 手动选择, DIRECT]
  - name: 🚀 手动选择
    type: select
    use: [default]
  - name: ♻️ 自动选择
    type: url-test
    use: [default]
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🤖 AI 服务
    type: select
    proxies: [🚀 节点选择, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, ♻️ 自动选择, 🚀 手动选择, DIRECT]
  - name: 🎵 TikTok
    type: select
    proxies: [🚀 节点选择, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, ♻️ 自动选择, 🚀 手动选择, DIRECT]
  - name: 📲 Telegram
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🇸🇬 新加坡节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🚀 手动选择, DIRECT]
  - name: ▶️ YouTube
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🇸🇬 新加坡节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🚀 手动选择, DIRECT]
  - name: 🎬 Netflix
    type: select
    proxies: [🎥 奈飞节点, 🚀 节点选择, ♻️ 自动选择, 🇸🇬 新加坡节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🚀 手动选择, DIRECT]
  - name: 🌍 国际媒体
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🚀 手动选择, DIRECT]
  - name: Ⓜ️ 微软服务
    type: select
    proxies: [DIRECT, 🚀 节点选择, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🚀 手动选择]
  - name: 🍎 苹果服务
    type: select
    proxies: [DIRECT, 🚀 节点选择, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🚀 手动选择]
  - name: 🎮 游戏平台
    type: select
    proxies: [DIRECT, 🚀 节点选择, 🇺🇸 美国节点, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🚀 手动选择]
  - name: 🐟 兜底策略
    type: select
    proxies: [🚀 节点选择, ♻️ 自动选择, DIRECT, 🇭🇰 香港节点, 🇨🇳 台湾节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🇰🇷 韩国节点, 🚀 手动选择]
  - name: 🇭🇰 香港节点
    type: url-test
    use: [default]
    filter: (?i)(港|香港|深港|沪港|京港|hk|hkg|hong kong|hongkong)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇨🇳 台湾节点
    type: url-test
    use: [default]
    filter: (?i)(台|台湾|台北|新北|彰化|高雄|tw|twn|taiwan|taipei)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇸🇬 新加坡节点
    type: url-test
    use: [default]
    filter: (?i)(新加坡|坡|狮城|星|sg|sgp|singapore)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇯🇵 日本节点
    type: url-test
    use: [default]
    filter: (?i)(日本|东京|大阪|埼玉|jp|jpn|japan|tokyo|osaka)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🇺🇸 美国节点
    type: url-test
    use: [default]
    filter: (?i)(美|美国|美西|美东|us|usa|united states|america|los angeles|san jose|seattle|chicago)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
  - name: 🇰🇷 韩国节点
    type: url-test
    use: [default]
    filter: (?i)(韩|韓|韩国|kr|korea|kor|seoul|首尔)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🎥 奈飞节点
    type: select
    use: [default]
    filter: (?i)(nf|netflix|media|奈飞|解锁)

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - oauth2.googleapis.com
    - accounts.google.com
    - +.googleapis.com
    - +.livekit.cloud
    - apple-relay.apple.com
    - apple-relay.mask.apple-dns.net
    - gateway.fe2.apple-dns.net
    - gateway.icloud.com

rule-providers:
  custom-direct:
    type: http
    behavior: classical
    format: text
    interval: 86400
    path: ./providers/rules/custom-direct.list
    url: https://raw.githubusercontent.com/jacob2826/clash-rule/main/UnBan.list
  apple-ai:
    type: http
    behavior: classical
    format: text
    interval: 86400
    path: ./providers/rules/apple-ai.list
    url: https://raw.githubusercontent.com/jacob2826/clash-rule/main/AppleAI.list
  openai:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/openai.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
  gemini:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/gemini.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
  claude:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/claude.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
  tiktok:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/tiktok.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.yaml
  telegram:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/telegram.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
  youtube:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/youtube.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
  netflix:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/netflix.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
  global-media:
    type: http
    behavior: classical
    format: yaml
    interval: 86400
    path: ./providers/rules/global-media.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia.yaml

rules:
  - RULE-SET,custom-direct,DIRECT
  - GEOSITE,private,DIRECT
  - RULE-SET,apple-ai,🤖 AI 服务
  - RULE-SET,openai,🤖 AI 服务
  - RULE-SET,gemini,🤖 AI 服务
  - RULE-SET,claude,🤖 AI 服务
  - RULE-SET,tiktok,🎵 TikTok
  - RULE-SET,telegram,📲 Telegram
  - RULE-SET,youtube,▶️ YouTube
  - RULE-SET,netflix,🎬 Netflix
  - GEOSITE,bahamut,🇨🇳 台湾节点
  - GEOSITE,bilibili,DIRECT
  - RULE-SET,global-media,🌍 国际媒体
  - GEOSITE,onedrive,Ⓜ️ 微软服务
  - GEOSITE,microsoft,Ⓜ️ 微软服务
  - GEOSITE,apple-cn,DIRECT
  - GEOSITE,apple,🍎 苹果服务
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,category-games,🎮 游戏平台
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,🐟 兜底策略
