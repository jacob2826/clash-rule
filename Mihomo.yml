# mihomo 配置模板：使用 rule-providers 组合维护中的上游规则。
# 使用前把 proxy-providers.subscription.url 替换为你的订阅地址；如客户端已负责注入节点，可仅合并 dns / proxy-groups / rule-providers / rules 部分。

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

proxy-providers:
  subscription:
    type: http
    url: https://example.com/your-subscription-url
    interval: 86400
    path: ./providers/proxy/subscription.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 节点选择
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png
    proxies: [自动选择, 香港节点, 台湾节点, 新加坡节点, 日本节点, 美国节点, 韩国节点, 手动选择, DIRECT]
  - name: 手动选择
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Rocket.png
    use: [subscription]
  - name: 自动选择
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
    use: [subscription]
    exclude-filter: (?i)(traffic|expire|expiry|date|reset|days?\s+left|剩余|到期|过期|流量|重置|官网|套餐|\d+(?:\.\d+)?\s*[kmgt]i?b?\s*[|｜]\s*\d+(?:\.\d+)?\s*[kmgt]i?b?)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: AI 服务
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
    proxies: [节点选择, 美国节点, 日本节点, 新加坡节点, 香港节点, 台湾节点, 自动选择, 手动选择, DIRECT]
  - name: TikTok
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok.png
    proxies: [节点选择, 美国节点, 日本节点, 新加坡节点, 香港节点, 台湾节点, 自动选择, 手动选择, DIRECT]
  - name: Telegram
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    proxies: [节点选择, 自动选择, 新加坡节点, 香港节点, 台湾节点, 日本节点, 美国节点, 韩国节点, 手动选择, DIRECT]
  - name: YouTube
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/YouTube.png
    proxies: [节点选择, 自动选择, 新加坡节点, 香港节点, 台湾节点, 日本节点, 美国节点, 韩国节点, 手动选择, DIRECT]
  - name: Netflix
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Netflix.png
    proxies: [奈飞节点, 节点选择, 自动选择, 新加坡节点, 香港节点, 台湾节点, 日本节点, 美国节点, 韩国节点, 手动选择, DIRECT]
  - name: 国际媒体
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
    proxies: [节点选择, 自动选择, 香港节点, 台湾节点, 新加坡节点, 日本节点, 美国节点, 韩国节点, 手动选择, DIRECT]
  - name: 谷歌FCM
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png
    proxies: [DIRECT, 节点选择, 美国节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 手动选择]
  - name: 微软Bing
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png
    proxies: [DIRECT, 节点选择, 美国节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 手动选择]
  - name: 微软服务
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png
    proxies: [DIRECT, 节点选择, 美国节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 手动选择]
