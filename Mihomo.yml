    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
    proxies: [DIRECT, 节点选择, 美国节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 手动选择]
  - name: 游戏平台
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png
    proxies: [DIRECT, 节点选择, 美国节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 手动选择]
  - name: 兜底策略
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png
    proxies: [节点选择, 自动选择, DIRECT, 香港节点, 台湾节点, 新加坡节点, 日本节点, 美国节点, 韩国节点, 手动选择]
  - name: 香港节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    use: [subscription]
    filter: (?i)(港|香港|深港|沪港|京港|hk|hkg|hong kong|hongkong)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 台湾节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
    use: [subscription]
    filter: (?i)(台|台湾|台北|新北|彰化|高雄|tw|twn|taiwan|taipei)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 新加坡节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
    use: [subscription]
    filter: (?i)(新加坡|坡|狮城|星|sg|sgp|singapore)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 日本节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
    use: [subscription]
    filter: (?i)(日本|东京|大阪|埼玉|jp|jpn|japan|tokyo|osaka)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 美国节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
    use: [subscription]
    filter: '(?i)(美|美国|美西|美东|\b(?:us|usa|united states|america|los angeles|san jose|seattle|chicago)\b)'
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
  - name: 韩国节点
    type: url-test
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png
    use: [subscription]
    filter: (?i)(韩|韓|韩国|kr|korea|kor|seoul|首尔)
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - name: 奈飞节点
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Netflix.png
    use: [subscription]
    filter: (?i)(nf|netflix|media|奈飞|解锁)

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    # 登录、实时音视频、Apple 中继域名不走 fake-ip。
    - oauth2.googleapis.com
    - accounts.google.com
    - +.googleapis.com
    - +.livekit.cloud
    - apple-relay.apple.com
    - apple-relay.mask.apple-dns.net
    - gateway.fe2.apple-dns.net
    - gateway.icloud.com
  ipv6: false
  default-nameserver: &cn_dns
    - 119.29.29.29
    - 223.5.5.5
  proxy-server-nameserver: *cn_dns
  direct-nameserver: *cn_dns
  nameserver: *cn_dns
  fallback: &oversea_dns
    - https://1.1.1.1/dns-query#节点选择
    - https://8.8.8.8/dns-query#节点选择
  nameserver-policy:
    geosite:private: *cn_dns
    geosite:cn: *cn_dns
    geosite:geolocation-!cn: *oversea_dns
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

